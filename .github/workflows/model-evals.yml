name: Model Evaluation

on:
  # Run on push to main (after deployment)
  push:
    branches: [main]
  # Run weekly on Mondays at 00:00 UTC
  schedule:
    - cron: '0 0 * * 1'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  evaluate-models:
    name: Evaluate OpenRouter Models
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run model evaluation
        id: eval
        env:
          API_KEY: ${{ secrets.API_KEY }}
          OUTPUT_DIR: ./eval-results
          MIN_SCORE: 50
        run: npm run eval:models
        continue-on-error: true

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        with:
          name: model-eval-results-${{ github.run_number }}
          path: eval-results/
          retention-days: 90

      - name: Get passing models
        id: passing
        run: |
          if [ -f "eval-results/passing-model-ids.txt" ]; then
            PASSING_COUNT=$(wc -l < eval-results/passing-model-ids.txt)
            echo "count=$PASSING_COUNT" >> $GITHUB_OUTPUT
            echo "Found $PASSING_COUNT passing models"

            # Output first few models for summary
            echo "Sample passing models:"
            head -5 eval-results/passing-model-ids.txt | sed 's/^/  - /'
          else
            echo "count=0" >> $GITHUB_OUTPUT
            echo "No passing models found!"
            exit 1
          fi

      - name: Create PR with updated model list
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-pull-request@v6
        with:
          title: 'chore: Update capable models list from evaluation'
          body: |
            Automated model evaluation results:

            - **Total models tested**: ${{ steps.eval.outputs }}
            - **Passing models**: ${{ steps.passing.outputs.count }}
            - **Minimum score**: 50

            This PR updates the list of capable models based on the latest evaluation run.

            Run details: #${{ github.run_number }}
          branch: update-model-list
          commit-message: 'chore: update capable models list from evaluation'
          labels: automated, models
          delete-branch: true

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('eval-results/summary.json')) {
              const summary = JSON.parse(fs.readFileSync('eval-results/summary.json', 'utf8'));
              const comment = `## Model Evaluation Results

              **Timestamp**: ${summary.timestamp}
              **Total Models Tested**: ${summary.testedModels}
              **Passing Models**: ${summary.passingModels}
              **Failing Models**: ${summary.failingModels}

              ### Passing Models (${summary.passingModels})
              ${summary.results.filter(r => r.passed).slice(0, 10).map(r => `- \`${r.modelId}\` (score: ${r.score})`).join('\n')}

              ### Failing Models (top 5)
              ${summary.results.filter(r => !r.passed).slice(0, 5).map(r => `- \`${r.modelId}\`: ${r.errors.join(', ')}`).join('\n')}`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  create-model-config:
    name: Create Model Config Artifact
    runs-on: ubuntu-latest
    needs: evaluate-models
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download evaluation results
        uses: actions/download-artifact@v4
        with:
          name: model-eval-results-${{ github.run_number }}
          path: eval-results/

      - name: Create model config file
        run: |
          if [ -f "eval-results/passing-model-ids.txt" ]; then
            # Create JSON array of passing models
            MODELS=$(cat eval-results/passing-model-ids.txt | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "{\"capableModels\":$MODELS,\"updatedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"runNumber\":${{ github.run_number }}}" > config/capable-models.json
            echo "Created config/capable-models.json"
            cat config/capable-models.json
          else
            echo "No passing models file found"
            exit 1
          fi

      - name: Upload model config as artifact
        uses: actions/upload-artifact@v4
        with:
          name: capable-models-config
          path: config/capable-models.json
          retention-days: 90
