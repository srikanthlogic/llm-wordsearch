name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Why is it needed?
      placeholder: I want to be able to...

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
      placeholder: Add a feature that...

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any other solutions you've considered?
      placeholder: Other approaches considered...

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, examples, or related issues.
      placeholder: Add any other context here.