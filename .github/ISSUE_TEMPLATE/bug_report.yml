name: Bug Report
description: Report something that isn't working as expected.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
      placeholder: Describe the issue...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to trigger the bug (1. Go to..., 2. Click on..., etc.)
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead.
      placeholder: The app should...

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens.
      placeholder: The app instead...

  - type: input
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots if applicable (drag & drop or paste).
      placeholder: https://...

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, app version, etc.
      placeholder: |
        - OS:
        - Browser:
        - App Version:

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information.
      placeholder: Add any other context about the problem here.