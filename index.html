    <script>
      // Handle initial theme detection before React loads
      (function() {
        const theme = localStorage.getItem('wordSearchTheme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (theme === 'dark' || (theme === 'system' && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
      
      tailwind.config = {
        darkMode: 'class',
      }

    <style>
      /* Design Tokens */
      :root {
        /* Primary Purple Palette */
        --primary-50: #faf5ff;
        --primary-100: #f3e8ff;
        --primary-200: #e9d5ff;
        --primary-300: #d8b4fe;
        --primary-400: #c084fc;
        --primary-500: #a855f7;
        --primary-600: #9333ea;
        --primary-700: #7e22ce;
        --primary-800: #6b21a8;
        --primary-900: #581c87;

        /* Semantic Colors */
        --success-50: #f0fdf4;
        --success-500: #22c55e;
        --success-600: #16a34a;
        --success-700: #15803d;

        --warning-50: #fffbeb;
        --warning-500: #f59e0b;
        --warning-600: #d97706;

        --error-50: #fef2f2;
        --error-500: #ef4444;
        --error-600: #dc2626;

        --info-50: #eff6ff;
        --info-500: #3b82f6;
        --info-600: #2563eb;

        /* Neutral Palette */
        --neutral-50: #fafafa;
        --neutral-100: #f5f5f5;
        --neutral-200: #e5e5e5;
        --neutral-300: #d4d4d4;
        --neutral-400: #a3a3a3;
        --neutral-500: #737373;
        --neutral-600: #525252;
        --neutral-700: #404040;
        --neutral-800: #262626;
        --neutral-900: #171717;

        /* Spacing Scale */
        --space-0: 0;
        --space-1: 0.25rem;
        --space-2: 0.5rem;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --space-5: 1.25rem;
        --space-6: 1.5rem;
        --space-8: 2rem;
        --space-10: 2.5rem;
        --space-12: 3rem;
        --space-16: 4rem;

        /* Border Radius */
        --radius-sm: 0.375rem;
        --radius-md: 0.5rem;
        --radius-lg: 0.75rem;
        --radius-xl: 1rem;
        --radius-2xl: 1.5rem;
        --radius-full: 9999px;

        /* Shadows */
        --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        --shadow-inner: inset 0 2px 4px 0 rgb(0 0 0 / 0.05);

        /* Typography */
        --font-sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-mono: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;

        /* Transitions */
        --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);

        /* Z-index scale */
        --z-dropdown: 1000;
        --z-sticky: 1020;
        --z-fixed: 1030;
        --z-modal-backdrop: 1040;
        --z-modal: 1050;
        --z-popover: 1060;
        --z-tooltip: 1070;
      }

      /* Dark mode tokens */
      .dark {
        --neutral-50: #171717;
        --neutral-100: #262626;
        --neutral-200: #404040;
        --neutral-300: #525252;
        --neutral-400: #737373;
        --neutral-500: #a3a3a3;
        --neutral-600: #d4d4d4;
        --neutral-700: #e5e5e5;
        --neutral-800: #f5f5f5;
        --neutral-900: #fafafa;
      }

      /* Base styles */
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      body {
        font-family: var(--font-sans);
        font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      }

      /* Focus visible styles for better accessibility */
      *:focus-visible {
        outline: 2px solid var(--primary-500);
        outline-offset: 2px;
      }

      *:focus:not(:focus-visible) {
        outline: none;
      }

      /* Glassmorphism utility */
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .dark .glass {
        background: rgba(30, 30, 40, 0.7);
      }

      /* Card styles */
      .card-elevated {
        background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
        box-shadow:
          0 1px 3px 0 rgb(0 0 0 / 0.1),
          0 1px 2px -1px rgb(0 0 0 / 0.1),
          inset 0 1px 0 0 rgb(255 255 255 / 0.5);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }

      .dark .card-elevated {
        background: linear-gradient(145deg, #1e1e2e 0%, #181825 100%);
        box-shadow:
          0 1px 3px 0 rgb(0 0 0 / 0.3),
          0 1px 2px -1px rgb(0 0 0 / 0.3),
          inset 0 1px 0 0 rgb(255 255 255 / 0.05);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Input styles */
      .input-base {
        transition: all var(--transition-base);
        border: 1.5px solid transparent;
      }

      .input-base:hover {
        border-color: var(--primary-300);
      }

      .input-base:focus {
        border-color: var(--primary-500);
        box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
      }

      .dark .input-base:hover {
        border-color: var(--primary-600);
      }

      .dark .input-base:focus {
        border-color: var(--primary-400);
        box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.25);
      }

      /* Button base styles */
      .btn-primary {
        background: linear-gradient(135deg, var(--primary-500) 0%, var(--primary-600) 100%);
        box-shadow: 0 4px 14px 0 rgba(168, 85, 247, 0.3);
        transition: all var(--transition-base);
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, var(--primary-600) 0%, var(--primary-700) 100%);
        box-shadow: 0 6px 20px 0 rgba(168, 85, 247, 0.4);
        transform: translateY(-1px);
      }

      .btn-primary:active {
        transform: translateY(0);
        box-shadow: 0 2px 10px 0 rgba(168, 85, 247, 0.3);
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-12px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(12px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      @keyframes pulse-subtle {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
      }

      .animate-fade-in {
        animation: fadeIn var(--transition-slow) ease-out;
      }

      .animate-fade-in-up {
        animation: fadeInUp var(--transition-slow) ease-out;
      }

      .animate-slide-in-left {
        animation: slideInLeft var(--transition-slow) ease-out;
      }

      .animate-slide-in-right {
        animation: slideInRight var(--transition-slow) ease-out;
      }

      .animate-scale-in {
        animation: scaleIn var(--transition-slow) ease-out;
      }

      /* Skeleton loading */
      .skeleton {
        background: linear-gradient(
          90deg,
          var(--neutral-200) 0%,
          var(--neutral-100) 50%,
          var(--neutral-200) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }

      .dark .skeleton {
        background: linear-gradient(
          90deg,
          var(--neutral-700) 0%,
          var(--neutral-600) 50%,
          var(--neutral-700) 100%
        );
      }

      /* Reduced motion support */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Print styles */
      @media print {
        body {
          background-color: white !important;
          -webkit-print-color-adjust: exact;
          color-adjust: exact;
        }
        .printable-page {
          page-break-after: always;
          box-shadow: none !important;
          border: none !important;
          margin: 0 !important;
          padding: 1cm !important;
          width: 100% !important;
          height: auto !important;
        }
        .no-print, .no-print * {
          display: none !important;
        }
        body > #root {
          display: none !important;
        }
        body > #portal-root {
          display: block !important;
        }
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: var(--neutral-300);
        border-radius: var(--radius-full);
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--neutral-400);
      }

      .dark ::-webkit-scrollbar-thumb {
        background: var(--neutral-600);
      }

      .dark ::-webkit-scrollbar-thumb:hover {
        background: var(--neutral-500);
      }

      /* Selection styles */
      ::selection {
        background-color: var(--primary-200);
        color: var(--primary-900);
      }

      .dark ::selection {
        background-color: var(--primary-700);
        color: var(--primary-100);
      }
    </style>
